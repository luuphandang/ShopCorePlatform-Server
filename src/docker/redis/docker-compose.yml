version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: shopcore-redis
    env_file:
      - ../.env
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - shopcore-network

volumes:
  redis-data:
    driver: local

networks:
  shopcore-network:
    driver: bridge
