name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: '0'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shopcore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_port_connectivity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Generate test JWT RS256 keypair
        run: |
          openssl genrsa -out access.pem 2048
          openssl rsa -in access.pem -pubout -out access.pub
          openssl genrsa -out refresh.pem 2048
          openssl rsa -in refresh.pem -pubout -out refresh.pub
          {
            echo "JWT_ACCESS_PRIVATE_KEY=$(base64 -w0 access.pem)"
            echo "JWT_ACCESS_PUBLIC_KEY=$(base64 -w0 access.pub)"
            echo "JWT_REFRESH_PRIVATE_KEY=$(base64 -w0 refresh.pem)"
            echo "JWT_REFRESH_PUBLIC_KEY=$(base64 -w0 refresh.pub)"
          } >> "$GITHUB_ENV"
      - name: Run jest with coverage
        run: npm test -- --coverage --maxWorkers=2
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: shopcore_test
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          RABBITMQ_URI: amqp://guest:guest@localhost:5672
          COOKIE_DOMAIN: localhost
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  build-image:
    name: Docker build & scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: shopcore-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shopcore-server:ci
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
